services:
  snipeit-mcp:
    # Local Dockerfile wraps upstream with two fixes: pin fastmcp==2.12.4
    # (upstream's server.py uses internal API that newer fastmcp removed) and
    # launch over HTTP. See mcp/Dockerfile for details.
    build: ./mcp
    environment:
      SNIPEIT_URL: ${SNIPEIT_URL}
      SNIPEIT_TOKEN: ${SNIPEIT_TOKEN}
      SNIPEIT_ALLOWED_TOOLS: ${SNIPEIT_ALLOWED_TOOLS}
    ports:
      # Loopback-only: CloudCLI on the host reaches MCP at
      # http://127.0.0.1:8765/mcp/. Not exposed on the tailnet — only the
      # CloudCLI UI itself should be tailnet-reachable.
      - "127.0.0.1:8765:8000"
    restart: unless-stopped
