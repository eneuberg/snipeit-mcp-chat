services:
  snipeit-mcp:
    image: ghcr.io/eneuberg/snipeit-mcp-chat/snipeit-mcp:latest
    environment:
      SNIPEIT_URL: '${SNIPEIT_URL}'
      SNIPEIT_TOKEN: '${SNIPEIT_TOKEN}'
      SNIPEIT_ALLOWED_TOOLS: '${SNIPEIT_ALLOWED_TOOLS}'
    ports:
      - '127.0.0.1:8765:8000'
    restart: unless-stopped

  webui:
    image: ghcr.io/eneuberg/snipeit-mcp-chat/webui:latest
    environment:
      PORT: 8080
      HOST: 0.0.0.0
    expose:
      - "8080"
    volumes:
      - webui_home:/home/node
      - webui_workspace:/workspace
      - '${CLAUDE_HOST_DIR}:/seed/claude:ro'
      - '${CLAUDE_CONFIG_FILE}:/seed/claude.json:ro'
    restart: unless-stopped

  proxy:
    build:
      context: ./proxy
    environment:
      PORT: 3583
      HOST: 0.0.0.0
      UPSTREAM: http://webui:8080
    ports:
      - "3583:3583"
    depends_on:
      - webui
    restart: unless-stopped

volumes:
  webui_home:
  webui_workspace: