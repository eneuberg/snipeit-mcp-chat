services:
  snipeit-mcp:
    # Local Dockerfile wraps upstream with two fixes: pin fastmcp==2.12.4
    # (upstream's server.py uses internal API that newer fastmcp removed) and
    # launch over HTTP. See mcp/Dockerfile for details.
    build: ./mcp
    environment:
      SNIPEIT_URL: ${SNIPEIT_URL}
      SNIPEIT_TOKEN: ${SNIPEIT_TOKEN}
      SNIPEIT_ALLOWED_TOOLS: ${SNIPEIT_ALLOWED_TOOLS}
    ports:
      # Loopback-only: the webui container (network_mode: host) reaches MCP
      # at http://127.0.0.1:8765/mcp/ — same URL the host's ~/.claude.json
      # already has baked in. Not exposed on the tailnet.
      - "127.0.0.1:8765:8000"
    restart: unless-stopped

  webui:
    # sugyan/claude-code-webui — mobile-friendly chat UI. Shells out to the
    # `claude` CLI (bundled in the image). No built-in auth; reuses the
    # host's ~/.claude (OAuth + MCP config) via the bind-mount below.
    build: ./webui
    # Host networking so http://127.0.0.1:8765/mcp/ in ~/.claude.json
    # resolves identically inside the container, and so port 8080 binds on
    # all host interfaces (incl. tailscale0) for phone access.
    network_mode: host
    environment:
      PORT: 8080
      HOST: 0.0.0.0
    volumes:
      - ${CLAUDE_HOST_DIR:-${HOME}/.claude}:/home/node/.claude
      # webui reads ~/.claude.json (the file, not the dir) for project list
      # + MCP config. Bind it read-write so webui can update state there.
      # Absolute path: snap-installed docker resolves ${HOME} to its private
      # snap home, not the host user's, which breaks the mount.
      - /home/admi/.claude.json:/home/node/.claude.json
      # Path-exact mount of the whole host home so every project cwd in
      # ~/.claude/projects/*.jsonl resolves inside the container. Without
      # this, claude spawns fail with a misleading "ENOENT" (actually the
      # cwd missing) whenever you pick a workspace that isn't explicitly
      # mounted.
      - /home/admi:/home/admi
    depends_on:
      - snipeit-mcp
    restart: unless-stopped
